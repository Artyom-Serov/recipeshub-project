name: Main CI/CD Foodgram

on:
  push:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: ./backend
        run: flake8 --max-line-length=88 --exclude=venv,migrations,__pycache__

      - name: Run tests
        working-directory: ./backend
        env:
          SECRET_KEY: test-secret-key
          DB_ENGINE: sqlite
          DEBUG: 'False'
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: python -m pytest tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node 18
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false

  build-and-push:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to DockerHub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./backend
          push: true
          tags: |
            artyomserov/foodgram_backend:latest
            artyomserov/foodgram_backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./frontend
          push: true
          tags: |
            artyomserov/foodgram_frontend:latest
            artyomserov/foodgram_frontend:${{ github.sha }}

      - name: Build and push nginx
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./infra
          push: true
          tags: |
            artyomserov/foodgram_nginx:latest
            artyomserov/foodgram_nginx:${{ github.sha }}
