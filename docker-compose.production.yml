volumes:
  fg_data:
  static:
  media:
  redoc:

services:
  db:
    image: postgres:13.10
    container_name: db
    restart: always
    env_file:
      - .env
    volumes:
      - fg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foodgram}"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: artyomserov/foodgram_frontend:latest
    container_name: frontend
    volumes:
      - static:/frontend_static
    depends_on:
      - backend

  backend:
    container_name: backend
    image: artyomserov/foodgram_backend:latest
    restart: always
    env_file:
      - .env
    volumes:
      - static:/backend_static
      - media:/app/media
      - redoc:/app/docs
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && \
      python manage.py collectstatic --noinput && \
      cp -r /app/collected_static/. /backend_static/static/ && \
      mkdir -p /app/docs && \
      cp -r /app/api/docs/* /app/docs/ && \
      gunicorn --bind 0.0.0.0:8000 foodgram.wsgi:application"

  nginx:
    image: artyomserov/foodgram_nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - static:/staticfiles
      - media:/media
      - redoc:/usr/share/nginx/html/api/docs:ro